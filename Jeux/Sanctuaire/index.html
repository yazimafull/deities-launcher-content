<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Deities: Sanctuaire</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <!-- CSS MODULAIRE -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/system.css">
    <link rel="stylesheet" href="css/hud.css">
    <link rel="stylesheet" href="css/gameplay.css">
    <link rel="stylesheet" href="css/pylone.css">
    <link rel="stylesheet" href="css/sanctuaire.css">
</head>

<body>

<!-- =========================
     CHARACTER SELECT
========================= -->
<section class="screen" data-screen="character-select">

    <div class="panel left-panel">
        <img src="icon.png" class="game-logo" alt="Game Logo" loading="lazy">
        <div class="left-menu">
            <button class="btn" data-action="open-options">Options</button>
            <button class="btn" data-action="quit">Quitter</button>
        </div>
    </div>

    <div class="panel center-panel">
        <div data-role="selected-character"></div>
        <button class="btn play-btn" data-action="play" disabled>Jouer</button>
    </div>

    <div class="panel right-panel">
        <h2 class="panel-title">Personnages</h2>
        <div class="character-list" data-role="character-list"></div>
        <button class="btn" data-action="create-character">Créer</button>
        <button class="btn hidden" data-action="delete-character">Supprimer</button>
    </div>

</section>

<!-- =========================
     SANCTUARY
========================= -->
<section class="screen hidden" data-screen="sanctuary">

    <div class="sanctuary-wrapper">
        <img src="sanctuary-background.jpg" alt="" loading="lazy">

        <div class="character-bar">
            <span data-role="character-name"></span>
        </div>

        <!-- Zones interactives -->
        <div class="zone" data-zone="pylone" tabindex="0" role="button">Pylône</div>
        <div class="zone" data-zone="marchand" tabindex="0" role="button">Marchand</div>
        <div class="zone" data-zone="coffre" tabindex="0" role="button">Coffre</div>
        <div class="zone" data-zone="forge" tabindex="0" role="button">Forge</div>
        <div class="zone" data-zone="grimoire" tabindex="0" role="button">Grimoire</div>

        <button class="btn" data-action="back-menu">Menu</button>
    </div>

    <div class="grid-overlay"></div>

</section>

<!-- =========================
     HUD
========================= -->
<div id="hud-root">

    <div class="hud-block" data-hud="player">
        <div class="bars">
            <div class="bar" data-bar="hp"><div class="fill"></div></div>
            <div class="bar" data-bar="shield"><div class="fill"></div></div>
            <div class="bar" data-bar="xp"><div class="fill"></div></div>
        </div>
    </div>

    <div class="hud-block" data-hud="dungeon">
        <div class="header">
            <span data-role="level"></span>
            <span data-role="timer"></span>
            <span data-role="bonus"></span>
        </div>
    </div>

    <div class="hud-block" data-hud="enemy">
        <div class="enemy-bar">
            <div class="track">
                <div class="fill"></div>
            </div>
        </div>
    </div>

</div>

<!-- =========================
     POPUPS (GENERIC)
========================= -->
<div class="overlay hidden" data-overlay="create-character">
    <div class="modal">
        <h1>Créer un personnage</h1>

        <input type="text" maxlength="20" placeholder="Pseudo..." data-input="name">

        <div class="classes">
            <button class="class" data-class="eclat">Éclat</button>
            <button class="class" data-class="vestige">Vestige</button>
            <button class="class" data-class="gardien">Gardien</button>
            <button class="class" data-class="souffle">Souffle</button>
        </div>

        <div class="actions">
            <button class="btn" data-action="confirm-create">Créer</button>
            <button class="btn" data-action="close">Retour</button>
        </div>
    </div>
</div>

<!-- =========================
     OPTIONS
========================= -->
<div class="overlay hidden" data-overlay="options">
    <div class="modal">
        <h2>Options</h2>
        <button class="btn" data-action="close">Fermer</button>
    </div>
</div>

<!-- =========================
     SCRIPTS
========================= -->

<script type="module" src="js/core/loader.js"></script>

<script>
window.addEventListener("DOMContentLoaded", () => {

    // Quit button
    document.querySelector('[data-action="quit"]')?.addEventListener("click", () => {
        if (window.electronAPI?.quitGame) {
            window.electronAPI.quitGame();
        } else {
            console.warn("Electron API non disponible");
        }
    });

});
</script>

<script type="module">
import { HUD } from "./js/UI/hud/hudSystem.js";

HUD.init({
    dungeon: {
        level: 1,
        timeLimitMs: 300000,
        enemyForcesMax: 100,
        affixes: []
    }
});

window.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "h") {
        HUD.toggleEditMode();
    }
});
</script>

</body>
</html>
