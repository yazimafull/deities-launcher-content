<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mini Survivors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ÉCRAN DE SÉLECTION DE PERSONNAGE — STYLE DIABLO II -->
    <div id="character-select-menu" class="character-screen">

        <!-- PANNEAU GAUCHE -->
        <div class="left-panel">
            <img src="icon.png" class="game-logo" alt="Game Logo">
            <div class="left-menu">
                <button class="btn left-btn" id="options-btn">Options</button>
                <button class="btn left-btn" id="quit-btn">Quitter</button>
            </div>
        </div>

        <!-- ZONE CENTRALE -->
        <div class="center-panel">
            <!-- Cadre supprimé (désactivé dans le CSS) -->
            <button class="btn play-btn" id="play-character-btn" disabled>Jouer</button>
        </div>

        <!-- PANNEAU DROIT -->
        <div class="right-panel">
            <h2 class="panel-title">Personnages</h2>

            <div id="character-list" class="character-list">
                <!-- Personnages injectés via JS -->
            </div>

            <button class="btn create-btn" id="create-character-btn">Créer un nouveau</button>

            <!-- Bouton poubelle (affiché seulement si un perso est sélectionné) -->
            <button class="delete-btn hidden" id="delete-character-btn">Supprimer</button>
        </div>

    </div>

    <!-- PANNEAU OPTIONS -->
    <div id="options-panel" class="options-overlay hidden">
        <div class="options-window">
            <h2>Options</h2>
            <p>Options graphiques (à venir)</p>
            <p>Options audio (à venir)</p>
            <p>Raccourcis clavier (à venir)</p>

            <button class="btn close-options-btn" id="close-options-btn">Fermer</button>
        </div>
    </div>

    <!-- MENU PAUSE -->
    <div id="pause-menu" class="menu hidden">
        <h2>Pause</h2>
        <button class="btn" id="resume-btn">Reprendre</button>
        <button class="btn" id="restart-btn">Relancer</button>
        <button class="btn" id="back-menu-btn">Menu principal</button>
    </div>

    <!-- MENU LEVEL UP -->
    <div id="levelup-menu" class="menu hidden">
        <h2>Choisissez un upgrade</h2>
        <div id="upgrade-choices"></div>
    </div>

    <!-- PANEL UPGRADES -->
    <div id="upgrade-panel" class="side-panel hidden">
        <h3>Upgrades</h3>
        <ul id="upgrade-list"></ul>
    </div>

    <!-- BARRE DE VIE -->
    <div id="healthbar-container" class="hidden">
        <div id="healthbar"></div>
    </div>

    <!-- BARRE D'XP -->
    <div id="xpbar-container" class="hidden">
        <div id="xpbar"></div>
    </div>

    <!-- CANVAS DU JEU -->
    <canvas id="game-canvas" class="hidden"></canvas>

    <!-- ÉCRAN DE MORT -->
    <div id="death-screen" class="death-panel hidden">
        <h1>Vous êtes mort</h1>
        <button class="btn" id="retry-button">Recommencer</button>
    </div>

    <!-- SCRIPTS -->
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/characterMenu.js"></script>

</body>
</html>
